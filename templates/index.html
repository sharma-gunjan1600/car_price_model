<!DOCTYPE html>
<html>
<head>
    <title>Car Price Prediction</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #75767B;
            font-family: Arial;
        }

        .big-dark {
            background-color: #f1f1f1;
            padding: 25px;
            width: 460px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: white;
            font-size: 15px;
        }

        input[readonly] {
            background-color: #f8f8f8;
            border: 1px solid #ccc;
            color: #555;
        }

        /* KM field fix to avoid overlap */
        .km-wrapper {
            position: relative;
            width: 100%;
        }

        #kms {
            padding-left: 12px;
            padding-right: 150px;  /* FIX: prevent overlap */
        }

        /* Suggested KM stays on RIGHT */
        #kms_suggestion {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #777;
            pointer-events: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        h2 {
            color: green;
            margin-top: 20px;
            text-align: center;
        }
    </style>

    <script>
        function updateInfo() {
            var carName = $("#car_name").val();

            $.post("/get_details", { car_name: carName }, function(data) {

                $("#company").val(data.company);

                $("#kms_suggestion").text(
                    "Suggested: " + data.kms_min + " - " + data.kms_max + " km"
                );
            });
        }
    </script>
</head>
<body>

<div class="big-dark">

    <h1>Car Price Prediction</h1>

    <form action="/predict" method="POST">

        <label>Car Name:</label>
        <select id="car_name" name="name" onchange="updateInfo()">
            {% for n in names %}
            <option value="{{ n }}" {% if selected_name == n %}selected{% endif %}>{{ n }}</option>
            {% endfor %}
        </select>

        <label>Company:</label>
        <input type="text" id="company" name="company" value="{{ selected_company }}" readonly>

        <label>Year:</label>
        <select id="year" name="year">
            {% for y in years %}
            <option value="{{ y }}" {% if selected_year == y %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
        </select>

        <label>Fuel Type:</label>
        <select id="fuel" name="fuel">
            {% for f in fuels %}
            <option value="{{ f }}" {% if selected_fuel == f %}selected{% endif %}>{{ f }}</option>
            {% endfor %}
        </select>

        <label>Kilometers Driven:</label>
        <div class="km-wrapper">
            <input type="number" id="kms" name="kms" value="{{ selected_kms }}" required>
            <span id="kms_suggestion"></span>
        </div>

        <button type="submit">Predict Price</button>

    </form>

    {% if price_range_only %}
    <h2>
        <span style="font-size: 18px;">{{ label_text }}</span><br>
        <span style="font-size: 24px; font-weight: bold;">{{ price_range_only }}</span>
    </h2>
    {% endif %}

</div>

<script>
    updateInfo();
</script>

</body>
</html>
